version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      cargo-non-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      github-actions-non-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
